<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Car Inside View Game</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #speed {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-family: Arial;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="speed">Speed: 0</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// Camera
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// Ground (road)
const roadGeo = new THREE.PlaneGeometry(500, 500);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// Car (simple box for now)
const car = new THREE.Group();

const bodyGeo = new THREE.BoxGeometry(1, 0.5, 2);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
car.add(body);

scene.add(car);

// Camera INSIDE car
camera.position.set(0, 0.4, 0.3);
car.add(camera);

// Movement variables
let speed = 0;
let maxSpeed = 1.5;
let acceleration = 0.03;
let friction = 0.02;
let turnSpeed = 0.04;

// Controls
let keys = {};

document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

// Game loop
function animate() {
  requestAnimationFrame(animate);

  // Acceleration
  if (keys["w"]) speed += acceleration;
  if (keys["s"]) speed -= acceleration;

  // Friction
  speed *= (1 - friction);

  // Limit speed
  speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

  // Turning
  if (keys["a"]) car.rotation.y += turnSpeed * speed * 2;
  if (keys["d"]) car.rotation.y -= turnSpeed * speed * 2;

  // Move car
  car.translateZ(-speed);

  // Update speed UI
  document.getElementById("speed").innerText = "Speed: " + Math.round(speed * 100);

  renderer.render(scene, camera);
}

animate();

// Resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
