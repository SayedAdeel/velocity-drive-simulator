<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Interior Drive</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }

  #speed {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: lime;
    font-size: 22px;
    font-family: Arial;
  }

  #dashboard {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 120px;
    background: #111;
    border-top: 3px solid #333;
  }
</style>
</head>
<body>

<div id="speed">Speed: 0</div>
<div id="dashboard"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// Camera
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,5);
scene.add(light);

// Road
const roadGeo = new THREE.PlaneGeometry(2000, 2000);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// Lane line
const lineGeo = new THREE.PlaneGeometry(2, 2000);
const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const line = new THREE.Mesh(lineGeo, lineMat);
line.rotation.x = -Math.PI / 2;
line.position.y = 0.01;
scene.add(line);

// Car group
const car = new THREE.Group();

// Invisible car body (logic only)
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,2),
  new THREE.MeshBasicMaterial({ visible: false })
);
car.add(body);

scene.add(car);

// CAMERA (inside view)
camera.position.set(0, 1.2, 0.5);
car.add(camera);

// 🔥 Fake Interior (dashboard)
const dash = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.5, 1),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);
dash.position.set(0, 0.8, 0.8);
camera.add(dash);

// Steering wheel
const wheel = new THREE.Mesh(
  new THREE.TorusGeometry(0.2, 0.05, 16, 100),
  new THREE.MeshStandardMaterial({ color: 0x000000 })
);
wheel.position.set(0, 0.6, 0.6);
wheel.rotation.x = Math.PI / 2;
camera.add(wheel);

// Movement
let speed = 0;
let maxSpeed = 2;
let acceleration = 0.05;
let friction = 0.02;
let turnSpeed = 0.03;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Game loop
function animate() {
  requestAnimationFrame(animate);

  // Movement
  if (keys["w"]) speed += acceleration;
  if (keys["s"]) speed -= acceleration;

  speed *= (1 - friction);
  speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

  if (keys["a"]) {
    car.rotation.y += turnSpeed * speed;
    wheel.rotation.z = 0.5;
  }

  if (keys["d"]) {
    car.rotation.y -= turnSpeed * speed;
    wheel.rotation.z = -0.5;
  }

  if (!keys["a"] && !keys["d"]) {
    wheel.rotation.z *= 0.9;
  }

  car.translateZ(-speed);

  // Speed UI
  document.getElementById("speed").innerText =
    "Speed: " + Math.round(speed * 100);

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
